# ── Server ────────────────────────────────────────────────────────────
server.port=8080

# ── MySQL Database ─────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/secure_faculty_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_mysql_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT ────────────────────────────────────────────────────────────────
# Replace with a strong Base64-encoded 256-bit secret in production
jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
jwt.expiration=86400000

# ── File Upload ────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads

# ── Logging ────────────────────────────────────────────────────────────
logging.level.org.springframework.security=DEBUG
logging.level.com.securefaculty=DEBUG
